<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containers & Grid System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

    <!-- Container Fluid -->
    <div class="container-fluid bg-primary text-white p-3 mb-4">
        <h1>Container Fluid (Full Width)</h1>
        <p>Container ini akan memenuhi seluruh lebar layar</p>
    </div>

    <!-- Container Fixed -->
    <div class="container">
        <div class="row">

            <div class="col-md-4 bg-success text-white p-3">
                <h3>Kolom 1</h3>
                <p>Layout 3 kolom pada desktop</p>
            </div>

            <div class="col-md-4 bg-warning p-3">
                <h3>Kolom 2</h3>
                <p>Layout 3 kolom pada desktop</p>
            </div>

            <div class="col-md-4 bg-danger text-white p-3">
                <h3>Kolom 3</h3>
                <p>Layout 3 kolom pada desktop</p>
            </div>

        </div>
    </div>

</body>
</html>
