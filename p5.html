<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombinasi Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

    <!-- Header dengan Container -->
    <div class="container-fluid bg-dark text-white p-4">
        <div class="container">
            <h1 class="display-4">Workshop Desain Web</h1>
            <p class="lead">Materi Bootstrap Framework</p>
        </div>
    </div>

    <!-- Content dengan Grid -->
    <div class="container mt-4">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="bg-light p-3 rounded">
                    <h4 class="text-primary">Menu</h4>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-decoration-none">Home</a></li>
                        <li><a href="#" class="text-decoration-none">About</a></li>
                        <li><a href="#" class="text-decoration-none">Services</a></li>
                        <li><a href="#" class="text-decoration-none">Contact</a></li>
                    </ul>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <h2 class="text-success">Dashboard Mahasiswa</h2>

                <!-- Table -->
                <table class="table table-striped table-hover">
                    <thead class="table-success">
                        <tr>
                            <th>NIM</th>
                            <th>Nama</th>
                            <th>Mata Kuliah</th>
                            <th>Nilai</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2021001</td>
                            <td>Ahmad Fauzi</td>
                            <td>Desain Web</td>
                            <td class="text-success fw-bold">A</td>
                        </tr>
                        <tr>
                            <td>2021002</td>
                            <td>Siti Aminah</td>
                            <td>Pemrograman Web</td>
                            <td class="text-warning fw-bold">B</td>
                        </tr>
                    </tbody>
                </table>

                <!-- Images Grid -->
                <h3 class="mt-4">Galeri Project</h3>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <img src="https://via.placeholder.com/300x200"
                             class="img-thumbnail"
                             alt="Project 1">
                    </div>
                    <div class="col-md-4 mb-3">
                        <img src="https://via.placeholder.com/300x200"
                             class="img-thumbnail"
                             alt="Project 2">
                    </div>
                    <div class="col-md-4 mb-3">
                        <img src="https://via.placeholder.com/300x200"
                             class="img-thumbnail"
                             alt="Project 3">
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
