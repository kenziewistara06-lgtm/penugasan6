<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography & Colors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-4">

    <!-- Heading Classes -->
    <h1 class="display-1">Display 1</h1>
    <h2 class="display-4">Display 4</h2>

    <!-- Text Alignment -->
    <p class="text-start bg-light p-2">Teks rata kiri</p>
    <p class="text-center bg-info text-white p-2">Teks rata tengah</p>
    <p class="text-end bg-dark text-white p-2">Teks rata kanan</p>

    <!-- Text Colors -->
    <p class="text-primary">Primary Color</p>
    <p class="text-success">Success Color</p>
    <p class="text-danger">Danger Color</p>
    <p class="text-warning bg-dark">Warning Color</p>

    <!-- Background Colors -->
    <div class="bg-primary text-white p-3 mb-2">Primary Background</div>
    <div class="bg-success text-white p-3 mb-2">Success Background</div>
    <div class="bg-danger text-white p-3">Danger Background</div>

</body>
</html>
