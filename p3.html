<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Tables</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-4">

    <!-- Basic Table -->
    <h3>Tabel Basic</h3>
    <table class="table">
        <thead>
            <tr>
                <th>#</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Jurusan</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Andi Wijaya</td>
                <td>andi@email.com</td>
                <td>Teknik Informatika</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Budi Santoso</td>
                <td>budi@email.com</td>
                <td>Sistem Informasi</td>
            </tr>
        </tbody>
    </table>

    <!-- Striped Table -->
    <h3>Tabel Striped</h3>
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Produk</th>
                <th>Harga</th>
                <th>Stok</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Laptop</td>
                <td>Rp 8.000.000</td>
                <td>15</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Mouse</td>
                <td>Rp 150.000</td>
                <td>30</td>
            </tr>
        </tbody>
    </table>

    <!-- Hover Table -->
    <h3>Tabel Hover</h3>
    <table class="table table-hover">
        <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Kota</th>
                <th>Suhu</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Jakarta</td>
                <td>32°C</td>
                <td>Cerah</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Bandung</td>
                <td>25°C</td>
                <td>Hujan Ringan</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
