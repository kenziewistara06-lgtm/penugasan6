<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-4">

    <!-- Responsive Image -->
    <h3>Gambar Responsif</h3>
    <img src="https://via.placeholder.com/800x400" class="img-fluid"
         alt="Contoh gambar responsif">

    <!-- Image Thumbnail -->
    <h3 class="mt-4">Gambar Thumbnail</h3>
    <img src="https://via.placeholder.com/200x200" class="img-thumbnail"
         alt="Thumbnail">

    <!-- Rounded Image -->
    <h3 class="mt-4">Gambar Bulat</h3>
    <img src="https://via.placeholder.com/150x150" class="rounded" alt="Rounded">
    <img src="https://via.placeholder.com/150x150" class="rounded-circle mx-2" alt="Circle">

    <!-- Image dengan Caption -->
    <h3 class="mt-4">Gambar dengan Figure</h3>
    <figure class="figure">
        <img src="https://via.placeholder.com/400x300"
             class="figure-img img-fluid rounded"
             alt="Figure image">
        <figcaption class="figure-caption">
            Ini adalah caption untuk gambar di atas.
        </figcaption>
    </figure>

    <!-- Image Alignment -->
    <h3 class="mt-4">Penyelarasan Gambar</h3>
    <div class="clearfix">
        <img src="https://via.placeholder.com/200x150"
             class="rounded float-start me-3"
             alt="Float left">
        <p>
            Gambar ini berada di sebelah kiri teks. Teks akan mengelilingi gambar
            karena menggunakan class float-start.
        </p>
    </div>

</body>
</html>
